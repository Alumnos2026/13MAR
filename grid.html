<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGINA CON GRID "REGILLA O CUADRICULA"</title>
    <style>
        .contenedor-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columnas iguales */
            gap: 15px;
            padding: 20px;
            background-color: #e5e5e5;
        }

        .item {
            background-color: #3498db;
            color: white;
            padding: 40px;
            text-align: center;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 8px;
        }

        .item-destacado {
            grid-column: span 2;
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <div class="contenedor-grid">
        <div class="item item-destacado">1 (Grande)</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>

</body>
</html>
