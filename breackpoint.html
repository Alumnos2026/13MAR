<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. Estilo para celulares (pantalla pequeña) */
        .caja {
            background-color: lightcoral;
            padding: 20px;
            text-align: center;
        }

        /* 2. EL BREAKPOINT (Para pantallas de más de 768px) */
        @media (min-width: 768px) {
            .caja {
                background-color: lightblue;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="caja">
        Si achicas la ventana soy roja, si la agrandas soy azul.
    </div>

</body>
</html>
